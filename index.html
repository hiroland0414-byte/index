<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>放射線技師・小論文添削プロコーチ</title>
    
    <link rel="apple-touch-icon" href="https://cdn-icons-png.flaticon.com/512/1021/1021575.png">
    <link rel="icon" href="https://cdn-icons-png.flaticon.com/512/1021/1021575.png">
    <link href="https://fonts.googleapis.com/css2?family=Sawarabi+Mincho&display=swap" rel="stylesheet">
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.4.120/pdf.min.js"></script>

    <style>
        :root { --main: #2c3e50; --accent: #e74c3c; --bg: #f8f9fa; }
        body { font-family: "Helvetica Neue", Arial, sans-serif; background: var(--bg); padding: 20px; color: #333; }
        .wrapper { max-width: 900px; margin: auto; background: white; padding: 30px; border-radius: 10px; box-shadow: 0 5px 15px rgba(0,0,0,0.1); }
        h1 { text-align: center; color: var(--main); border-bottom: 2px solid var(--main); padding-bottom: 10px; font-size: 22px; }
        .input-group { margin-bottom: 15px; }
        label { font-weight: bold; font-size: 14px; display: block; margin-bottom: 5px; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 5px; font-size: 14px; box-sizing: border-box; }
        textarea { height: 250px; }
        .pdf-upload-box { background: #eef7ff; border: 2px dashed #3498db; padding: 15px; text-align: center; border-radius: 5px; margin-bottom: 15px; }
        .btn-group { display: flex; gap: 10px; margin-top: 20px; }
        button { flex: 1; padding: 15px; border: none; border-radius: 5px; cursor: pointer; font-size: 16px; font-weight: bold; color: white; transition: 0.2s; }
        .btn-run { background: var(--main); }
        .btn-pdf { background: #27ae60; display: none; }
        
        /* 添削結果（12px・手書き風） */
        .pdf-item p, .eval-msg { font-family: 'Sawarabi Mincho', serif; font-size: 12px; line-height: 1.6; text-align: justify; }
        #result-container { display: none; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
        .pdf-section-title { background: #f0f0f0; padding: 8px; font-weight: bold; border-left: 5px solid var(--main); margin: 15px 0 10px; }
    </style>
</head>
<body>

<div class="wrapper">
    <h1>放射線技師・小論文添削支援ツール</h1>

    <div class="input-group">
        <label>志望施設名</label>
        <input type="text" id="hosp" placeholder="例：〇〇大学病院">
    </div>

    <div class="pdf-upload-box">
        <label style="color:#2980b9;">【PDFから入力を選ぶ】</label>
        <input type="file" id="pdfFile" accept="application/pdf" onchange="readPDF(this)">
        <p style="font-size: 11px; color: #666; margin-top: 5px;">※PDFを選択すると下の本文にテキストが自動抽出されます</p>
    </div>

    <div class="input-group">
        <label>小論文本文（直接入力・修正も可）</label>
        <textarea id="essay" placeholder="ここに文章を入力してください"></textarea>
    </div>

    <div class="btn-group">
        <button class="btn-run" onclick="startCoach()">添削を実行する</button>
        <button id="pdfBtn" class="btn-pdf" onclick="exportPDF()">結果をPDF保存</button>
    </div>

    <div id="result-container">
        <div id="pdf-area"></div>
    </div>
</div>

<script>
// PDF読み取り機能
async function readPDF(input) {
    const file = input.files[0];
    if (!file) return;

    const reader = new FileReader();
    reader.onload = async function() {
        const typedarray = new Uint8Array(this.result);
        const pdf = await pdfjsLib.getDocument(typedarray).promise;
        let fullText = "";
        for (let i = 1; i <= pdf.numPages; i++) {
            const page = await pdf.getPage(i);
            const textContent = await page.getTextContent();
            fullText += textContent.items.map(item => item.str).join("");
        }
        document.getElementById('essay').value = fullText;
    };
    reader.readAsArrayBuffer(file);
}

function startCoach() {
    const essay = document.getElementById('essay').value;
    if(essay.length < 10) { alert("文章を入力してください。"); return; }

    const pdfArea = document.getElementById('pdf-area');
    document.getElementById('result-container').style.display = "block";
    
    pdfArea.innerHTML = `
        <div class="pdf-section-title">1. 構成バランス診断</div>
        <div class="eval-msg">文章量は適切です。序論・本論・結論の比率を意識して、より論理的な展開を目指しましょう。</div>
        
        <div class="pdf-section-title">2. 専門的視点のアドバイス</div>
        <div class="pdf-item">
            <strong>● 放射線技師としての自律性</strong>
            <p>医療現場でのチームの一員として、画像情報の専門家であることを強調してください。特に施設理念に基づいた「患者への寄り添い」を具体的に記述すると評価が高まります。</p>
        </div>
    `;
    document.getElementById('pdfBtn').style.display = 'block';
}

function exportPDF() {
    const element = document.getElementById('pdf-area');
    html2pdf().from(element).set({
        margin: 15, filename: '添削結果.pdf', jsPDF: { unit: 'mm', format: 'a4' }
    }).save();
}
</script>
</body>
</html>
